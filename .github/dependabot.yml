version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "your-username"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "npm"
    directory: "/tests/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    reviewers:
      - "your-username"
    labels:
      - "dependencies"
      - "javascript"
