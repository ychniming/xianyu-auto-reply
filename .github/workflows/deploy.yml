name: Deploy

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/xianyu-auto-reply:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /www/wwwroot/xianyu-auto-reply
            git pull origin main
            docker-compose -f deploy/docker-compose.yml down
            docker-compose -f deploy/docker-compose.yml up -d --build
            docker logs xianyu-auto-reply --tail 50

      - name: Verify deployment
        run: |
          sleep 10
          curl -s http://${{ secrets.SERVER_HOST }}:8080/health

  backup:
    name: Backup Database
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Backup database
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            BACKUP_DATE=$(date +%Y%m%d_%H%M%S)
            cp /www/wwwroot/xianyu-auto-reply/data/xianyu_data.db /root/backups/xianyu_data_${BACKUP_DATE}.db
            ls -la /root/backups/
